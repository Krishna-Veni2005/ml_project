<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Performance Prediction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px 45px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header span {
            font-size: 48px;
            display: block;
            margin-bottom: 15px;
        }
        h1 {
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 22px;
        }
        label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
        }
        select, input[type="number"] {
            width: 100%;
            padding: 13px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #ffffff;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
            appearance: none;
        }
        select:focus, input[type="number"]:focus {
            border-color: #e94560;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.2);
        }
        select option {
            background: #1a1a2e;
            color: #ffffff;
        }
        input[type="number"]::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e94560, #c23152);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.4);
            margin-top: 10px;
            letter-spacing: 0.5px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(233, 69, 96, 0.6);
        }
        .submit-btn:active {
            transform: translateY(0);
        }
        .result-box {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.15), rgba(15, 52, 96, 0.3));
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 16px;
            text-align: center;
        }
        .result-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .result-score {
            color: #e94560;
            font-size: 2.8rem;
            font-weight: 700;
        }
        .result-suffix {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            margin-top: 5px;
        }
        .back-btn {
            display: block;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 25px;
            transition: color 0.3s;
        }
        .back-btn:hover {
            color: rgba(255, 255, 255, 0.8);
        }
        @media (max-width: 500px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 35px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span>📊</span>
            <h1>Student Exam Performance Prediction</h1>
            <p class="subtitle">Fill in the details below to predict your Math score</p>
        </div>

        <form action="{{ url_for('predict_datapoint')}}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender" required>
                        <option selected disabled value="">Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Race or Ethnicity</label>
                    <select name="race_ethnicity" required>
                        <option selected disabled value="">Select Ethnicity</option>
                        <option value="group A">Group A</option>
                        <option value="group B">Group B</option>
                        <option value="group C">Group C</option>
                        <option value="group D">Group D</option>
                        <option value="group E">Group E</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Parental Level of Education</label>
                <select name="parental_level_of_education" required>
                    <option selected disabled value="">Select Parent Education</option>
                    <option value="associate's degree">Associate's Degree</option>
                    <option value="bachelor's degree">Bachelor's Degree</option>
                    <option value="high school">High School</option>
                    <option value="master's degree">Master's Degree</option>
                    <option value="some college">Some College</option>
                    <option value="some high school">Some High School</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Lunch Type</label>
                    <select name="lunch" required>
                        <option selected disabled value="">Select Lunch Type</option>
                        <option value="free/reduced">Free / Reduced</option>
                        <option value="standard">Standard</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Test Preparation Course</label>
                    <select name="test_preparation_course" required>
                        <option selected disabled value="">Select Course</option>
                        <option value="none">None</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Writing Score (out of 100)</label>
                    <input type="number" name="reading_score" placeholder="e.g. 75" min="0" max="100" required />
                </div>

                <div class="form-group">
                    <label>Reading Score (out of 100)</label>
                    <input type="number" name="writing_score" placeholder="e.g. 80" min="0" max="100" required />
                </div>
            </div>

            <button type="submit" class="submit-btn">🎯 Predict My Math Score</button>
        </form>

        {% if results %}
        <div class="result-box">
            <div class="result-label">Your Predicted Math Score</div>
            <div class="result-score">{{ "%.1f"|format(results) }}</div>
            <div class="result-suffix">out of 100</div>
        </div>
        {% endif %}

        <a href="/" class="back-btn">← Back to Home</a>
    </div>
</body>
</html>
